on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IBM_TELEMETRY_DISABLED: true

jobs:
  static-checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun ci
      - run: bunx biome ci --error-on-warnings

      - name: Build docs
        run: bun run build:docs

      - run: bun run test:src-types

      - run: bun run test:package-exports

  changes:
    runs-on: macos-15
    outputs:
      unit: ${{ steps.filter.outputs.unit }}
      e2e: ${{ steps.filter.outputs.e2e }}
      docs-deploy: ${{ steps.filter.outputs.docs-deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            unit:
              - 'src/**'
              - 'tests/**'
              - 'tests-svelte3/**'
              - 'tests-svelte4/**'
              - 'scripts/**'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/**'
            e2e:
              - 'src/**'
              - 'e2e/**'
              - 'scripts/**'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/**'
            docs-deploy:
              - 'src/**'
              - 'css/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/**'

  test:
    needs: [static-checks, changes]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.unit == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test types (Svelte 5)
        run: bun run test:types

      - name: Test (Svelte 5)
        run: bun run test

  test-e2e:
    needs: [static-checks, changes, test]
    if: |
      always() &&
      !cancelled() &&
      needs.static-checks.result == 'success' &&
      needs.changes.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true')
    runs-on: ubuntu-latest
    # Official image includes Chromium/Firefox/WebKit + system deps
    # Bump tag with @playwright/test in bun.lock.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --ipc=host --init
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      HOME: /root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Playwright image is minimal; setup-bun extracts a zip and needs unzip.
      # Try installing first (fast path) and only refresh apt lists if needed.
      - run: DEBIAN_FRONTEND=noninteractive apt-get install -y unzip || { apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y unzip; }

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # --ignore-scripts skips the ibmtelemetry postinstall (already disabled
      # via IBM_TELEMETRY_DISABLED) and Playwright's browser download (browsers
      # are baked into the image at PLAYWRIGHT_BROWSERS_PATH).
      - run: bun ci --ignore-scripts

      - name: Build CSS
        run: bun run build:css

      - name: E2E tests
        run: bunx playwright test --project=chromium

  test-svelte3:
    needs: [static-checks, changes]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.unit == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun ci

      - name: Setup Svelte 3
        run: |
          cd tests-svelte3
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test Svelte 3 Types
        run: |
          cd tests-svelte3
          bun run test:types

      - name: Test Svelte 3
        run: |
          cd tests-svelte3
          bun run test

  test-svelte4:
    needs: [static-checks, changes]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.unit == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun ci

      - name: Setup Svelte 4 compat
        run: |
          cd tests-svelte4
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test types (Svelte 4 compat)
        run: |
          cd tests-svelte4
          bun run test:types

      - name: Test (Svelte 4 compat)
        run: |
          cd tests-svelte4
          bun run test

  deploy-docs:
    needs: [static-checks, changes, test]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs-deploy == 'true') &&
      !failure() && !cancelled()
    uses: ./.github/workflows/deploy-docs.yml
    secrets: inherit
