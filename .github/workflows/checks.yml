on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IBM_TELEMETRY_DISABLED: true

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci
      - run: bunx biome ci --error-on-warnings

  test-svelte4:
    needs: [lint]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test Svelte 4 Types
        run: bun run test:types

      - name: Test Svelte 4
        run: bun --bun run test

  test-e2e:
    needs: [lint]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: E2E tests
        run: bun run test:e2e

  test-svelte3:
    needs: [lint]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Setup Svelte 3
        run: |
          cd tests-svelte3
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test Svelte 3 Types
        run: |
          cd tests-svelte3
          bun run test:types

      - name: Test Svelte 3
        run: |
          cd tests-svelte3
          bun --bun run test

  test-svelte5:
    needs: [lint]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Setup Svelte 5
        run: |
          cd tests-svelte5
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test Svelte 5 Types
        run: |
          cd tests-svelte5
          bun run test:types

      - name: Test Svelte 5
        run: |
          cd tests-svelte5
          bun --bun run test

  types:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Build docs
        run: bun run build:docs

      - run: bun run test:src-types

  deploy-docs:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    needs: [lint, test-svelte4, types]
    uses: ./.github/workflows/deploy-docs.yml
    secrets: inherit
