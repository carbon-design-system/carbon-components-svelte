on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IBM_TELEMETRY_DISABLED: true

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci
      - run: bunx biome ci --error-on-warnings

  changes:
    runs-on: macos-15
    outputs:
      src-or-tests: ${{ steps.filter.outputs.src-or-tests }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src-or-tests:
              - 'src/**'
              - 'tests/**'
              - '.github/**'

  test:
    needs: [lint, changes]
    if: needs.changes.outputs.src-or-tests == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test types (Svelte 5)
        run: bun run test:types

      - name: Test (Svelte 5)
        run: bun --bun run test

  test-e2e:
    needs: [lint, test]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('node_modules/@playwright/test/package.json') }}

      - name: Install Playwright browser
        run: bunx playwright install --with-deps ${{ matrix.browser }}

      - name: E2E tests
        run: bunx playwright test --project=${{ matrix.browser }}

  test-svelte3:
    needs: [lint, changes]
    if: needs.changes.outputs.src-or-tests == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Setup Svelte 3
        run: |
          cd tests-svelte3
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test Svelte 3 Types
        run: |
          cd tests-svelte3
          bun run test:types

      - name: Test Svelte 3
        run: |
          cd tests-svelte3
          bun --bun run test

  test-svelte4:
    needs: [lint, changes]
    if: needs.changes.outputs.src-or-tests == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Setup Svelte 4 compat
        run: |
          cd tests-svelte4
          bun ci

      - name: Generate types
        run: bun run build:docs

      - name: Test types (Svelte 4 compat)
        run: |
          cd tests-svelte4
          bun run test:types

      - name: Test (Svelte 4 compat)
        run: |
          cd tests-svelte4
          bun --bun run test

  types:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci

      - name: Build docs
        run: bun run build:docs

      - run: bun run test:src-types

  deploy-docs:
    needs: [lint, test, types]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') &&
      !failure() && !cancelled()
    uses: ./.github/workflows/deploy-docs.yml
    secrets: inherit
