        <rect id="left-select" fill="var(--cds-text-secondary, #525252)" x="100" y="87" width="20" height="6"></rect>
        <g id="left-chevron" transform="translate(128, 82)" fill="var(--cds-icon-primary, #161616)">
            <g transform="translate(8, 8) scale(0.5) translate(-16, -16)">
