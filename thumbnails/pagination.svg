<?xml version="1.0" encoding="UTF-8"?>
<svg width="320px" height="180px" viewBox="0 0 320 180" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>pagination</title>
    <g id="pagination" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect id="bar" fill="var(--cds-field-01, #f4f4f4)" x="40" y="74" width="240" height="32"></rect>
