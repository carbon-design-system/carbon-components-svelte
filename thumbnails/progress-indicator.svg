<?xml version="1.0" encoding="UTF-8"?>
<svg width="320px" height="180px" viewBox="0 0 320 180" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>progress-indicator</title>
    <g id="progress-indicator" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect id="connector-1" fill="var(--cds-interactive-01, #0f62fe)" x="110" y="89" width="40" height="2"></rect>
        <rect id="connector-2" fill="var(--cds-border-subtle, #e0e0e0)" x="170" y="89" width="40" height="2"></rect>
