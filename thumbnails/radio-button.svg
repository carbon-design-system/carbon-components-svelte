<?xml version="1.0" encoding="UTF-8"?>
<svg width="320px" height="180px" viewBox="0 0 320 180" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>radio-button</title>
    <g id="radio-button" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="selected">
            <circle cx="84" cy="66" r="8" fill="none" stroke="var(--cds-icon-primary, #161616)" stroke-width="1"></circle>
            <circle cx="84" cy="66" r="3.5" fill="var(--cds-icon-primary, #161616)"></circle>
            <rect id="label" fill="var(--cds-text-disabled, #c6c6c6)" x="104" y="62" width="120" height="8"></rect>
        </g>
