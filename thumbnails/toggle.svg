<?xml version="1.0" encoding="UTF-8"?>
<svg width="320px" height="180px" viewBox="0 0 320 180" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>toggle</title>
    <g id="toggle" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="off">
            <rect id="label" fill="var(--cds-text-disabled, #c6c6c6)" x="86" y="68" width="60" height="8"></rect>
            <rect id="track" fill="var(--cds-border-strong, #8d8d8d)" x="86" y="88" width="48" height="24" rx="12"></rect>
            <circle id="knob" fill="var(--cds-ui-02, #ffffff)" cx="98" cy="100" r="9"></circle>
        </g>
        <g id="on">
            <rect id="label" fill="var(--cds-text-disabled, #c6c6c6)" x="174" y="68" width="60" height="8"></rect>
            <rect id="track" fill="var(--cds-interactive-01, #0f62fe)" x="174" y="88" width="48" height="24" rx="12"></rect>
            <circle id="knob" fill="var(--cds-ui-02, #ffffff)" cx="210" cy="100" r="9"></circle>
        </g>
    </g>
</svg>
